<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 변경">🌙</button>
<a class="contact-link" href="contact.html">🤝 제휴 문의</a>
<a class="animal-link" href="animal.html">🐾 동물상 테스트</a>

<h1>🎱 로또 번호 추첨기</h1>
<p class="subtitle">1~45 중 6개 + 보너스 1개를 자동으로 추첨합니다</p>

<div class="card">
  <div class="balls-wrap" id="ballsWrap">
    <span class="placeholder-msg">버튼을 눌러 추첨하세요!</span>
  </div>

  <div class="btn-group">
    <button class="btn-draw" id="drawBtn" onclick="draw()">🎲 1개 추첨</button>
    <button class="btn-draw btn-multi" id="drawMultiBtn" onclick="drawMulti()">⚡ 5개 동시 추첨</button>
  </div>

  <div class="divider"></div>

  <p class="history-title">
    추첨 내역
    <span class="count-badge" id="countBadge">0회</span>
  </p>
  <ul class="history-list" id="historyList">
    <li class="empty-msg" id="emptyMsg">아직 추첨 내역이 없어요.</li>
  </ul>
</div>

<script src="script.js"></script>

<div class="disqus-wrap">
  <div id="disqus_thread"></div>
</div>

<script>
  var disqus_config = function () {
    this.page.url = 'https://ide-test-builder1.pages.dev/';
    this.page.identifier = 'lotto-picker-main';
  };
  (function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://producttbuilder.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
  })();
</script>

</body>
</html>
