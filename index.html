<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>🎱 로또 번호 추첨기</h1>
<p class="subtitle">1~45 중 6개 + 보너스 1개를 자동으로 추첨합니다</p>

<div class="card">
  <div class="balls-wrap" id="ballsWrap">
    <span style="color:#8892b0; font-size:0.9rem;">버튼을 눌러 추첨하세요!</span>
  </div>

  <button class="btn-draw" id="drawBtn" onclick="draw()">🎲 번호 추첨!</button>

  <div class="divider"></div>

  <p class="history-title">
    추첨 내역
    <span class="count-badge" id="countBadge">0회</span>
  </p>
  <ul class="history-list" id="historyList">
    <li class="empty-msg" id="emptyMsg">아직 추첨 내역이 없어요.</li>
  </ul>
</div>

<script src="script.js"></script>
</body>
</html>
